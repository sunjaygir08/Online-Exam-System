<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Smart Exam Hub</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
</head>
<body class="fade-in">

  <!-- Animated background mesh -->
  <div class="animated-mesh"></div>

  <!-- Floating Theme Toggle -->
  <button id="themeToggleBtn" class="theme-toggle-btn theme-toggle-btn--floating" aria-label="Toggle Theme">
    <i class="fas fa-moon"></i>
  </button>

  <!-- Centered Register Card -->
  <div style="display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: var(--spacing-md);">
    <div class="card" style="width: 100%; max-width: 440px;">
      
      <!-- Brand Logo & Header -->
      <div style="text-align: center; margin-bottom: var(--spacing-xl);">
        <div style="
          width: 60px;
          height: 60px;
          border-radius: var(--radius-md);
          background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
          display: inline-flex;
          align-items: center;
          justify-content: center;
          font-size: var(--font-lg);
          color: #ffffff;
          margin-bottom: var(--spacing-md);
          box-shadow: 0 8px 16px rgba(6, 182, 212, 0.3);
        ">
          <i class="fas fa-user-plus"></i>
        </div>
        <h2>Create Account</h2>
        <p style="margin-top: var(--spacing-xs);">Join our examination platform</p>
      </div>

      <!-- Registration Form -->
      <form id="registerForm" novalidate>
        
        <!-- Full Name Input -->
        <div class="form-group">
          <input type="text" id="regName" class="form-control" placeholder=" " required>
          <label class="form-label" for="regName">Full Name</label>
        </div>

        <!-- Email Input -->
        <div class="form-group">
          <input type="email" id="regEmail" class="form-control" placeholder=" " required>
          <label class="form-label" for="regEmail">Email Address</label>
        </div>

        <!-- Role Select Dropdown -->
        <div class="form-group" style="margin-bottom: var(--spacing-lg);">
          <select id="regRole" class="select-control" required>
            <option value="" disabled selected>Select Your Role</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher (Examiner)</option>
          </select>
        </div>

        <!-- Password Input -->
        <div class="form-group" style="margin-bottom: var(--spacing-md);">
          <input type="password" id="regPassword" class="form-control" placeholder=" " required>
          <label class="form-label" for="regPassword">Password</label>
        </div>

        <!-- Password Strength indicator progress bar -->
        <div class="password-strength">
          <div id="strengthBar" class="password-strength__bar"></div>
        </div>

        <!-- Confirm Password Input -->
        <div class="form-group">
          <input type="password" id="regConfirmPassword" class="form-control" placeholder=" " required>
          <label class="form-label" for="regConfirmPassword">Confirm Password</label>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn--primary" style="width: 100%; margin-top: var(--spacing-md); height: 46px;">
          <i class="fas fa-check-circle"></i> Create Account
        </button>
      </form>

      <!-- Redirect to login link -->
      <div style="text-align: center; margin-top: var(--spacing-xl); font-size: var(--font-sm);">
        <p>Already have an account? <a href="index.html" style="font-weight: 600;">Log in here</a></p>
      </div>

    </div>
  </div>

  <!-- JavaScript Client Core -->
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
