<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Take Exam - Smart Exam Hub</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/animations.css">
</head>
<body class="fade-in" style="overflow-y: auto;">

  <!-- Animated background mesh -->
  <div class="animated-mesh"></div>

  <!-- Full Screen Exam Container -->
  <div style="min-height: 100vh; display: flex; flex-direction: column;">
    
    <!-- Top Focused Exam Header -->
    <header class="navbar" style="background: rgba(15, 23, 42, 0.7); position: sticky; top: 0; z-index: 100; height: 75px; padding: 0 var(--spacing-lg);">
      <div>
        <h2 id="examTitleHeader" style="font-size: var(--font-base); font-weight: 700; color: var(--text-primary);">Loading Exam...</h2>
        <span id="questionCounterText" style="font-size: var(--font-xs); color: var(--text-muted);">Question -- of --</span>
      </div>

      <!-- Ticking Timer with Alarm States -->
      <div style="display: flex; align-items: center; gap: var(--spacing-md); background: rgba(0, 0, 0, 0.2); padding: 8px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border-light);">
        <i class="fas fa-hourglass-half" style="color: var(--secondary);"></i>
        <span id="timerText" style="font-size: var(--font-md); font-weight: 700; font-family: monospace;">--:--</span>
      </div>
    </header>

    <!-- Timer progress bar container -->
    <div class="timer-bar">
      <div id="timerProgressFill" class="timer-bar__fill" style="width: 100%"></div>
    </div>

    <!-- Main Exam Workspace Layout (Question & Palette Split) -->
    <div style="flex: 1; padding: var(--spacing-lg); max-width: 1200px; width: 100%; margin: 0 auto; display: grid; grid-template-columns: 1fr 280px; gap: var(--spacing-lg);">
      
      <!-- Left: Question Area -->
      <div style="display: flex; flex-direction: column; justify-content: space-between; gap: var(--spacing-lg);">
        
        <!-- Question Card -->
        <div id="questionCardBody" class="card" style="min-height: 320px; display: flex; flex-direction: column; justify-content: center;">
          <!-- Dynamic Question Text & Radio Options Rendered Here -->
          <div style="text-align: center;">
            <div class="spinner" style="margin: auto;"></div>
            <p style="margin-top: var(--spacing-md);">Loading exam questions workspace...</p>
          </div>
        </div>

        <!-- Question Nav bar -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: var(--spacing-md);">
          <button id="prevQuestionBtn" class="btn btn--outline" style="visibility: hidden;">
            <i class="fas fa-arrow-left"></i> Previous Question
          </button>
          
          <button id="nextQuestionBtn" class="btn btn--primary">
            Next Question <i class="fas fa-arrow-right"></i>
          </button>
          
          <button id="submitExamTriggerBtn" class="btn btn--secondary" style="display: none;">
            <i class="fas fa-paper-plane"></i> Submit Exam
          </button>
        </div>

      </div>

      <!-- Right: Navigation Palette Grid -->
      <div class="card" style="height: fit-content;">
        <h4 style="margin-bottom: var(--spacing-md); display: flex; align-items: center; gap: 8px;">
          <i class="fas fa-th" style="color: var(--secondary);"></i> Question Palette
        </h4>
        
        <!-- Legend Indicator -->
        <div style="font-size: var(--font-xs); display: flex; flex-direction: column; gap: 6px; margin-bottom: var(--spacing-md); border-bottom: 1px solid var(--border-light); padding-bottom: var(--spacing-sm);">
          <div style="display: flex; align-items: center; gap: 6px;">
            <span style="width: 12px; height: 12px; background: var(--success); border-radius: 2px; display: inline-block;"></span>
            <span>Answered</span>
          </div>
          <div style="display: flex; align-items: center; gap: 6px;">
            <span style="width: 12px; height: 12px; background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.4); border-radius: 2px; display: inline-block;"></span>
            <span>Skipped / Visited</span>
          </div>
          <div style="display: flex; align-items: center; gap: 6px;">
            <span style="width: 12px; height: 12px; background: rgba(30, 41, 59, 0.3); border: 1px solid var(--border); border-radius: 2px; display: inline-block;"></span>
            <span>Unanswered</span>
          </div>
        </div>

        <!-- Grid layout container -->
        <div id="questionPaletteGrid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--spacing-sm);">
          <!-- Palette buttons rendered here -->
        </div>
      </div>

    </div>

  </div>

  <!-- Submit confirmation modal dialog -->
  <div id="submitConfirmModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Confirm Exam Submission</h3>
        <button class="close-button" id="cancelSubmitBtn">&times;</button>
      </div>
      <div class="modal-body">
        <p style="margin-bottom: var(--spacing-md);">Are you sure you want to finalize and submit your answers? You cannot modify them after submission.</p>
        <p id="submitWarningText" style="font-weight: 500; font-size: var(--font-sm);"></p>
      </div>
      <div class="modal-footer">
        <button id="confirmSubmitBtn" class="btn btn--secondary">
          <i class="fas fa-check"></i> Yes, Submit
        </button>
      </div>
    </div>
  </div>

  <!-- Fullscreen Submission Loader Overlay -->
  <div id="examLoaderOverlay" style="
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(15, 23, 42, 0.9);
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: var(--spacing-md);
  ">
    <div class="spinner"></div>
    <h3 style="color: var(--secondary);">Grading exam and recording scores...</h3>
  </div>

  <!-- JavaScript Client Core -->
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/timer.js"></script>
  <script src="../js/exam.js"></script>
</body>
</html>
